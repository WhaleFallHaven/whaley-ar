<!DOCTYPE html>
<html lang="zh-CN">
<!--
      ©鲸鲸工作室
      Art: Tworain
      Dev: Billiton
    -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Browser chrome colour matches splash background (mobile) -->
  <meta name="theme-color" content="#080c16" />

  <!--
    Early lang detection — must run BEFORE any content renders.
    Sets html[lang] from localStorage or navigator.language so
    screen readers announce the correct language from the first frame.
    Keep this inline, synchronous, and tiny.
  -->
  <script>
    (function(){
      try{
        var s=localStorage.getItem("whaley-lang");
        var l=(s==="zh"||s==="en")?s:
              (navigator.language||"zh").toLowerCase().startsWith("zh")?"zh":"en";
        document.documentElement.lang=l==="zh"?"zh-CN":"en";
      }catch(_){}
    })();
  </script>

  <!-- Adobe Fonts (Typekit) — LXGW WenKai TC, used for both 中文 and English -->
  <link rel="preconnect" href="https://use.typekit.net" crossorigin>
  <link rel="preconnect" href="https://p.typekit.net" crossorigin>
  <script>
    (function(d) {
      var config = {
        kitId: 'oep4rkz',
        scriptTimeout: 3000,
        async: true
      },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <!-- i18n + font loader — load before stylesheets so strings are ready -->
  <script src="./assets/js/i18n.js"></script>

  <link rel="stylesheet" href="./assets/css/style.css" />
  <title>鲸落港-鲸鲸AR</title>

  <!-- AR runtime: A-Frame + MindAR + importmap for spine-threejs -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/BillyPung/mind-ar-js/mindar-image-aframe.prod.js"></script>
  <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.181.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.181.0/examples/jsm/",
          "mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js",
          "spine-threejs": "https://unpkg.com/@esotericsoftware/spine-threejs@4.2.95/dist/esm/spine-threejs.min.mjs"
        }
      }
  </script>
</head>

<body>
<!-- Start UI Overlay -->
<div id="ui-overlay">

  <!-- Bubble particles -->
  <div class="bubbles" aria-hidden="true">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <!-- Lang switcher injected here by WhaleyI18n.injectSwitcher() -->

  <div class="start-container">

    <!-- Studio credit -->
    <p class="brand-studio" data-i18n="studio"></p>

    <!--
      hgroup groups the Chinese title + English subtitle semantically.
      Screen readers treat them as a single heading unit.
    -->
    <hgroup>
      <h1 class="brand-title">鲸落港</h1>
      <p  class="brand-en" data-i18n="titleEn" role="doc-subtitle"></p>
    </hgroup>

    <div class="brand-divider" aria-hidden="true"></div>

    <p id="main-instruction" data-i18n="instruction"></p>

    <!-- Safari / WeChat Warning -->
    <div id="safari-warning" style="display: none;">
      <h3 data-i18n="safariTitle"></h3>
      <p  data-i18n="safariDesc"></p>
      <p><strong data-i18n="safariBrowsers"></strong></p>
      <button id="copy-link-button" data-i18n="copyLink"></button>
      <p id="copy-success" style="display: none;" data-i18n="copySuccess"></p>
    </div>

    <!-- Normal interface -->
    <div id="normal-interface">
      <!--
        aria-busy: tells AT the button is in a loading state.
        aria-disabled mirrors the disabled attribute for AT that
        may not honour the native disabled state consistently.
      -->
      <button id="start-button"
              disabled
              aria-disabled="true"
              aria-busy="false"
              data-i18n="btnPreparing"></button>

      <div id="loading-indicator" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p data-i18n="arLoading"></p>
      </div>

      <!--
        aria-live="polite": announces when preload status text changes
        without interrupting the current screen reader utterance.
      -->
      <div id="model-preload-status"
           role="status"
           aria-live="polite"
           style="display: none;"
           data-i18n="modelPreload"></div>

      <div class="loading-progress" style="display: none;">
        <div class="loading-progress-bar" id="preload-progress"></div>
      </div>

      <!--
        role="alert" + aria-live="assertive": error text is announced
        immediately and interrupts any current screen reader speech.
        data-i18n left empty so applyToDOM() skips it when empty;
        showError() sets data-i18n to the error key so lang switch
        re-renders the correct translated message.
      -->
      <div id="error-message"
           role="alert"
           aria-live="assertive"
           style="display: none;"></div>
    </div>

  </div>
</div>

<!-- Model Loading Status in AR -->
<div id="model-loading-overlay" class="model-loading-overlay">
    <span data-i18n="modelAr"></span>
    <div class="loading-progress">
        <div class="loading-progress-bar" id="ar-progress"></div>
    </div>
</div>

<!-- Copyright Drawer -->
<div id="copyright-drawer">

  <!--
    Changed from <div> to <button>:
    - Keyboard focusable by default
    - Enter/Space activates click handler without extra JS
    - aria-expanded reflects open/closed state for AT
    - aria-controls links it to the content it toggles
  -->
  <button id="copyright-tab"
          aria-expanded="false"
          aria-controls="copyright-content"
          data-i18n="copyright"></button>

  <div id="copyright-content">
    <!-- .copyright-inner required for grid-row animation (overflow:hidden) -->
    <div class="copyright-inner">
      <p data-i18n="copyrightLine1"></p>
      <p data-i18n="copyrightLine2"></p>
      <div class="steam-wrap">
        <iframe src="https://store.steampowered.com/widget/3061230/"
                frameborder="0"
                class="steam-widget"
                title="Whalefall Haven on Steam"
                loading="lazy"></iframe>
      </div>
    </div>
  </div>

</div>

<!-- A-Frame Scene -->
<a-scene mindar-image="imageTargetSrc: /assets/targets/whaley-target-bothsides.mind;
            maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.01; warmupTolerance: 3; autoStart: false;"
         color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
         vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"
              cursor="fuse: false; rayOrigin: mouse;"
              raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

    <a-entity id="whaley-target-0" mindar-image-target="targetIndex: 0">
        <!-- Spine container will be added via THREE.js -->
    </a-entity>

    <a-entity id="whaley-target-1" mindar-image-target="targetIndex: 1">
        <!-- Mirrored spine will be shown here -->
    </a-entity>
</a-scene>

<script type="module">
    import * as spine from "spine-threejs";

    document.addEventListener("DOMContentLoaded", function() {
        WhaleyI18n.init();
        WhaleyI18n.injectSwitcher();
        const t = (key) => WhaleyI18n.t(key);

        // Use THREE from A-Frame's global scope
        const THREE = window.THREE;
        // WeChat (iOS) in-app browser detection — its WKWebView can't run camera AR
        function isWeChatIOS() {
            const ua = navigator.userAgent.toLowerCase();
            const isIOS = /iphone|ipad|ipod/.test(ua);
            return /micromessenger/.test(ua) && isIOS;
        }

        // Get references to DOM elements
        const sceneEl = document.querySelector('a-scene');
        const uiOverlay = document.getElementById('ui-overlay');
        const startButton = document.getElementById('start-button');
        const loadingIndicator = document.getElementById('loading-indicator');
        const modelPreloadStatus = document.getElementById('model-preload-status');
        const preloadProgress = document.getElementById('preload-progress');
        const errorMessage = document.getElementById('error-message');
        const modelLoadingOverlay = document.getElementById('model-loading-overlay');
        const arProgress = document.getElementById('ar-progress');

        // Safari-related elements
        const safariWarning = document.getElementById('safari-warning');
        const normalInterface = document.getElementById('normal-interface');
        const copyLinkButton = document.getElementById('copy-link-button');
        const copySuccess = document.getElementById('copy-success');
        const mainInstruction = document.getElementById('main-instruction');

        // Copyright drawer
        const copyrightDrawer = document.getElementById('copyright-drawer');
        const copyrightTab = document.getElementById('copyright-tab');

        // Copyright drawer toggle
        copyrightTab.addEventListener('click', () => {
            const isExpanded = copyrightDrawer.classList.toggle('expanded');
            copyrightTab.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
        });

        // Check for WeChat in-app browser and show the open-in-browser fallback
        if (isWeChatIOS()) {
            console.log("WeChat iOS detected - showing open-in-browser warning");
            safariWarning.style.display = 'block';
            normalInterface.style.display = 'none';
            mainInstruction.style.display = 'none';

            // Copy link button functionality
            copyLinkButton.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    copySuccess.style.display = 'block';
                    copyLinkButton.textContent = t('copyDone');

                    setTimeout(() => {
                        copySuccess.style.display = 'none';
                        copyLinkButton.textContent = t('copyLink');
                    }, 3000);
                } catch (error) {
                    console.error('Failed to copy link:', error);
                    const textArea = document.createElement('textarea');
                    textArea.value = window.location.href;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);

                    copySuccess.style.display = 'block';
                    copyLinkButton.textContent = t('copyDone');

                    setTimeout(() => {
                        copySuccess.style.display = 'none';
                        copyLinkButton.textContent = t('copyLink');
                    }, 3000);
                }
            });

            return;
        }

        // Spine variables
        const whaleyTarget0 = document.getElementById('whaley-target-0');
        const whaleyTarget1 = document.getElementById('whaley-target-1');
        let skeletonMesh;
        let assetManager;
        let target0Visible = false;
        let target1Visible = false;
        let activeTarget = null; // 0 or 1
        let isAnimating = false;

        let arSystem;
        let isARStarted = false;
        let sceneLoaded = false;
        let modelLoaded = false;

        // Helper function to show error message
        function showError(message, key) {
            errorMessage.textContent = message;
            // Store the key so lang switch can re-render this message
            if (key) errorMessage.dataset.i18n = key;
            errorMessage.style.display = 'block';
            startButton.disabled = false;
            startButton.setAttribute('aria-disabled', 'false');
            startButton.setAttribute('aria-busy', 'false');
            startButton.textContent = t('btnRetry');
            loadingIndicator.style.display = 'none';
            modelPreloadStatus.style.display = 'none';
        }

        // Update progress bar
        function updateProgress(progressBar, percent) {
            progressBar.style.width = percent + '%';
        }

        // Spine asset preloading
        async function preloadSpineAssets() {
            return new Promise((resolve, reject) => {
                try {
                    modelPreloadStatus.style.display = 'block';
                    modelPreloadStatus.textContent = t('modelPreload');
                    updateProgress(preloadProgress, 0);

                    const baseUrl = "./assets/spine/";
                    const pma = false;

                    assetManager = new spine.AssetManager(baseUrl, undefined, pma);
                    assetManager.loadText("Whaley.json");
                    assetManager.loadTextureAtlas("Whaley.atlas.txt");

                    let fakeProgress = 0;
                    const checkLoading = setInterval(() => {
                        // Simulate progress
                        fakeProgress = Math.min(fakeProgress + 5, 90);
                        updateProgress(preloadProgress, fakeProgress);

                        if (assetManager.isLoadingComplete()) {
                            clearInterval(checkLoading);
                            console.log('Spine assets preloaded successfully');
                            updateProgress(preloadProgress, 100);
                            modelLoaded = true;
                            resolve();
                        }

                        if (assetManager.hasErrors()) {
                            clearInterval(checkLoading);
                            const errors = assetManager.getErrors();
                            console.error('Spine loading errors:', errors);
                            reject(new Error('Spine assets failed to load: ' + Object.keys(errors).join(', ')));
                        }
                    }, 100);

                } catch (error) {
                    console.error('Spine preload failed:', error);
                    reject(error);
                }
            });
        }

        // Create Spine mesh
        function createSpineMesh() {
            try {
                const atlas = assetManager.require("Whaley.atlas.txt");
                const atlasLoader = new spine.AtlasAttachmentLoader(atlas);
                const skeletonJson = new spine.SkeletonJson(atlasLoader);
                skeletonJson.scale = 1;
                const skeletonData = skeletonJson.readSkeletonData(assetManager.require("Whaley.json"));

                skeletonMesh = new spine.SkeletonMesh({
                    skeletonData,
                    zOffset: 0.00001,  // ← Key fix: minimize Z separation between slots
                    materialFactory: param => new THREE.MeshBasicMaterial({
                        ...param,
                        side: THREE.DoubleSide,
                        transparent: true,
                        depthWrite: false,
                        depthTest: false,  // Since we're using tiny zOffset, disable depth test
                        blending: THREE.CustomBlending,
                        blendSrc: THREE.OneFactor,        // PMA blending
                        blendDst: THREE.OneMinusSrcAlphaFactor,
                    })
                });

                skeletonMesh.position.set(0, 0, -0.5);
                // Scale will be set when attached to target (normal or mirrored)

                // Setup click/touch interaction using Pointer Events
                const raycaster = new THREE.Raycaster();
                const pointer = new THREE.Vector2();

                sceneEl.addEventListener('pointerup', (event) => {
                    if (activeTarget === null || isAnimating) return;

                    // Ignore if it was a drag/scroll (pointer moved significantly)
                    if (event.pointerType === 'touch' && event.isPrimary === false) return;

                    const camera = sceneEl.camera;
                    pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
                    pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

                    raycaster.setFromCamera(pointer, camera);
                    const intersects = raycaster.intersectObject(skeletonMesh, true);

                    if (intersects.length > 0) {
                        handleSpineClick();
                    }
                });

                console.log('Spine mesh created successfully');
                return true;
            } catch (error) {
                console.error('Failed to create Spine mesh:', error);
                return false;
            }
        }

        // Helper function to move mesh between targets
        function attachMeshToTarget(targetIndex) {
            if (!skeletonMesh) return;

            // Detach from current parent if exists
            if (skeletonMesh.parent) {
                skeletonMesh.parent.remove(skeletonMesh);
            }

            // Attach to new target
            const targetObject = targetIndex === 0 ? whaleyTarget0.object3D : whaleyTarget1.object3D;
            targetObject.add(skeletonMesh);

            // Set scale (mirror for target 1)
            if (targetIndex === 0) {
                skeletonMesh.scale.set(0.0005, 0.0005, 0.0005);
            } else {
                skeletonMesh.scale.set(-0.0005, 0.0005, 0.0005); // Mirrored
            }

            activeTarget = targetIndex;
            console.log(`Mesh attached to target ${targetIndex}, mirrored: ${targetIndex === 1}`);
        }

        // Animation logic
        function playAnimation(animationName, loop, onComplete) {
            if (!skeletonMesh) return;

            const trackEntry = skeletonMesh.state.setAnimation(0, animationName, loop);

            if (onComplete) {
                trackEntry.listener = {
                    complete: () => {
                        onComplete();
                    }
                };
            }
        }

        function startIdleSequence() {
            isAnimating = true;
            playAnimation("idle_adv", false, () => {
                playAnimation("Idle_tired", true);
                isAnimating = false;
            });
        }

        function handleSpineClick() {
            isAnimating = true;
            console.log("Whaley clicked");

            playAnimation("See", false, () => {
                playAnimation("idle_adv", false, () => {
                    playAnimation("Idle_tired", true);
                    isAnimating = false;
                });
            });
        }

        // Enhanced preload assets function
        async function preloadAssets() {
            try {
                await preloadSpineAssets();
                console.log("All assets preloaded successfully");
            } catch (error) {
                console.warn("Spine preload failed:", error);
                throw error;
            }
        }

        // Wait for scene to load
        sceneEl.addEventListener('loaded', function () {
            console.log("Scene loading...");
            arSystem = sceneEl.systems["mindar-image-system"];
            sceneLoaded = true;

            startButton.disabled = false;
            startButton.setAttribute('aria-disabled', 'false');
            startButton.textContent = t('btnReady');
            console.log("Scene loaded, AR system ready");
        });

        // Target 0 tracking events
        whaleyTarget0.addEventListener("targetFound", event => {
            console.log("Whaley target 0 found (normal)");
            target0Visible = true;

            if (skeletonMesh && modelLoaded) {
                attachMeshToTarget(0);
                if (activeTarget === 0) startIdleSequence();
                modelLoadingOverlay.style.display = 'none';
            } else {
                modelLoadingOverlay.style.display = 'block';
                let fakeProgress = 0;
                const progressInterval = setInterval(() => {
                    fakeProgress += 2;
                    updateProgress(arProgress, fakeProgress);

                    if (fakeProgress >= 100 || modelLoaded) {
                        clearInterval(progressInterval);
                        if (modelLoaded) {
                            if (!skeletonMesh) {
                                createSpineMesh();
                            }
                            attachMeshToTarget(0);
                            startIdleSequence();
                            modelLoadingOverlay.style.display = 'none';
                        }
                    }
                }, 100);
            }
        });

        whaleyTarget0.addEventListener("targetLost", event => {
            console.log("Whaley target 0 lost");
            target0Visible = false;

            // If target 1 is visible, switch to it
            if (target1Visible) {
                attachMeshToTarget(1);
                startIdleSequence();
            } else {
                isAnimating = false;
                activeTarget = null;
                modelLoadingOverlay.style.display = 'none';
            }
        });

        // Target 1 tracking events
        whaleyTarget1.addEventListener("targetFound", event => {
            console.log("Whaley target 1 found (mirrored)");
            target1Visible = true;

            if (skeletonMesh && modelLoaded) {
                // Only switch if target 0 is not visible (priority to target 0)
                if (!target0Visible) {
                    attachMeshToTarget(1);
                    startIdleSequence();
                }
                modelLoadingOverlay.style.display = 'none';
            } else {
                modelLoadingOverlay.style.display = 'block';
                let fakeProgress = 0;
                const progressInterval = setInterval(() => {
                    fakeProgress += 2;
                    updateProgress(arProgress, fakeProgress);

                    if (fakeProgress >= 100 || modelLoaded) {
                        clearInterval(progressInterval);
                        if (modelLoaded) {
                            if (!skeletonMesh) {
                                createSpineMesh();
                            }
                            if (!target0Visible) {
                                attachMeshToTarget(1);
                                startIdleSequence();
                            }
                            modelLoadingOverlay.style.display = 'none';
                        }
                    }
                }, 100);
            }
        });

        whaleyTarget1.addEventListener("targetLost", event => {
            console.log("Whaley target 1 lost");
            target1Visible = false;

            // If target 0 is visible, switch to it
            if (target0Visible) {
                attachMeshToTarget(0);
                startIdleSequence();
            } else {
                isAnimating = false;
                activeTarget = null;
                modelLoadingOverlay.style.display = 'none';
            }
        });

        // Start button click handler
        startButton.addEventListener('click', async () => {
            errorMessage.style.display = 'none';

            if (!sceneLoaded || !arSystem) {
                showError(t('errTimeout'), 'errTimeout');
                return;
            }

            startButton.disabled = true;
            startButton.setAttribute('aria-disabled', 'true');
            startButton.setAttribute('aria-busy', 'true');
            startButton.textContent = t('btnLoading');
            loadingIndicator.style.display = "block";

            try {
                console.log("Starting asset preload...");
                await preloadAssets();

                // Create Spine mesh after assets loaded
                if (!createSpineMesh()) {
                    throw new Error("Failed to create Spine mesh");
                }

                console.log("Starting AR system...");
                arSystem.start();
                isARStarted = true;

            } catch (error) {
                console.error("Failed to start AR:", error);

                if (error.message && error.message.includes('Spine')) {
                    showError(t('errSpine'), 'errSpine');
                } else if (error.message && error.message.includes('camera')) {
                    showError(t('errCamera'), 'errCamera');
                } else {
                    showError(t('errStartPrefix') + (error.message || t('errUnknown')));
                }
            }
        });

        // AR Event Listeners
        sceneEl.addEventListener("arReady", (event) => {
            console.log("MindAR is ready");
            uiOverlay.classList.add('hidden');
        });

        sceneEl.addEventListener("arError", (event) => {
            console.error("MindAR failed to start", event);
            uiOverlay.classList.remove('hidden');

            if (event.detail && event.detail.error) {
                if (event.detail.error.name === 'NotAllowedError') {
                    showError(t('errCameraDenied'), 'errCameraDenied');
                } else if (event.detail.error.name === 'NotFoundError') {
                    showError(t('errCameraNotFound'), 'errCameraNotFound');
                } else {
                    showError(t('errArPrefix') + event.detail.error.message);
                }
            } else {
                showError(t('errArGeneric'), 'errArGeneric');
            }
        });

        // Animation loop for Spine
        let lastFrameTime = Date.now() / 1000;
        function animate() {
            requestAnimationFrame(animate);

            if (skeletonMesh && activeTarget !== null) {
                const now = Date.now() / 1000;
                const delta = now - lastFrameTime;
                lastFrameTime = now;

                skeletonMesh.update(delta);
            }
        }
        animate();

        // Scene loading timeout
        setTimeout(() => {
            if (!sceneLoaded) {
                console.warn("Scene loading timeout");
                showError(t('errTimeout'), 'errTimeout');
            }
        }, 15000);
    });
</script>
</body>
</html>
